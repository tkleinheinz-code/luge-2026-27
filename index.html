<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ellie Kleinheinz — US Luge Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #070F1E; }
:root {
  --ice: #5BB8F5; --ice-dark: #1A6FAF; --gold: #F0B429;
  --silver: #9BA3AF; --bronze: #C67B3A; --green: #22D46E;
  --track-bg: #070F1E; --card-border: rgba(91,184,245,0.18);
  --text-main: #E8F4FD; --text-muted: #7BA7CC;
  --radius-md: 8px; --radius-lg: 12px;
}
#app { background: var(--track-bg); color: var(--text-main); min-height: 100vh; }
.header { background: #0A1628; border-bottom: 1px solid var(--card-border); padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 12px; }
.h-name { font-size: 16px; font-weight: 500; color: var(--text-main); }
.h-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.nav { display: flex; gap: 0; padding: 0 22px; border-bottom: 1px solid var(--card-border); background: #0A1628; overflow-x: auto; }
.nav-btn { background: none; border: none; padding: 10px 14px; font-size: 12px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-family: inherit; transition: color 0.15s; display: flex; align-items: center; gap: 5px; }
.nav-btn.active { color: var(--ice); border-bottom-color: var(--ice); }
.nav-btn:hover { color: var(--text-main); }
.view { display: none; padding: 18px 22px; }
.view.active { display: block; }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
.stat-card { background: rgba(91,184,245,0.05); border: 0.5px solid var(--card-border); border-radius: var(--radius-md); padding: 11px 14px; }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; }
.stat-value.green { color: var(--green); }
.stat-value.gold  { color: var(--gold); }
.stat-value.ice   { color: var(--ice); }
.card { background: rgba(91,184,245,0.04); border: 0.5px solid var(--card-border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 14px; }
.card-title { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.run-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.run-table th { text-align: left; color: var(--text-muted); padding: 5px 9px; font-weight: 400; border-bottom: 0.5px solid var(--card-border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
.run-table td { padding: 7px 9px; border-bottom: 0.5px solid rgba(91,184,245,0.06); color: var(--text-main); }
.run-table tr:last-child td { border-bottom: none; }
.run-table tr:hover td { background: rgba(91,184,245,0.04); }
.badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; }
.badge-gold   { background: rgba(240,180,41,0.15);  color: var(--gold); }
.badge-silver { background: rgba(155,163,175,0.15); color: var(--silver); }
.badge-bronze { background: rgba(198,123,58,0.15);  color: var(--bronze); }
.badge-blue   { background: rgba(91,184,245,0.12);  color: var(--ice); }
.pb-tag { color: var(--green); font-size: 10px; margin-left: 3px; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-md); margin-bottom: 3px; }
.lb-row.me { background: rgba(91,184,245,0.09); border: 0.5px solid var(--card-border); }
.lb-pos { width: 22px; font-size: 13px; font-weight: 500; color: var(--text-muted); text-align: center; }
.lb-pos.p1 { color: var(--gold); } .lb-pos.p2 { color: var(--silver); } .lb-pos.p3 { color: var(--bronze); }
.lb-name { flex: 1; font-size: 13px; }
.lb-pts  { font-size: 13px; font-weight: 500; color: var(--ice); font-variant-numeric: tabular-nums; }
.lb-diff { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
.world-map { position: relative; width: 100%; height: 340px; border-radius: var(--radius-md); overflow: hidden; }
#worldSvg { width: 100%; height: 100%; background: #0A1628; }
.track-popup { position: absolute; background: #0D2140; border: 0.5px solid var(--ice); border-radius: var(--radius-md); padding: 10px 13px; font-size: 12px; pointer-events: none; z-index: 10; min-width: 155px; display: none; }
.track-popup strong { font-size: 13px; color: var(--ice); display: block; margin-bottom: 3px; }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-bottom: 14px; }
.photo-slot { aspect-ratio: 1; background: rgba(91,184,245,0.04); border: 0.5px dashed var(--card-border); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; transition: border-color 0.15s; }
.photo-slot:hover { border-color: var(--ice); }
.photo-slot img { width: 100%; height: 100%; object-fit: cover; }
.photo-caption { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(7,15,30,0.82); font-size: 10px; padding: 3px 6px; color: var(--text-muted); text-align: center; }
.upload-btn { background: rgba(91,184,245,0.07); border: 0.5px solid var(--card-border); color: var(--ice); border-radius: var(--radius-md); padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; }
.upload-btn:hover { background: rgba(91,184,245,0.14); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 3px; }
.form-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.form-input, .form-select { background: rgba(91,184,245,0.07); border: 0.5px solid var(--card-border); color: var(--text-main); border-radius: var(--radius-md); padding: 7px 10px; font-size: 12px; font-family: inherit; }
.form-select option { background: #0D2140; color: var(--text-main); }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--ice); }
.btn-primary { background: var(--ice-dark); border: none; color: #fff; border-radius: var(--radius-md); padding: 8px 18px; font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-primary:hover { background: #2280C0; }
.filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-chip { background: rgba(91,184,245,0.05); border: 0.5px solid var(--card-border); color: var(--text-muted); border-radius: 20px; padding: 3px 11px; font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.filter-chip.active { background: rgba(91,184,245,0.16); border-color: var(--ice); color: var(--ice); }
.filter-chip:hover { color: var(--text-main); }
.speed-bar-wrap { margin-bottom: 9px; }
.speed-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.speed-bar-track { height: 3px; background: rgba(91,184,245,0.1); border-radius: 2px; overflow: hidden; }
.speed-bar-fill  { height: 100%; background: var(--ice); border-radius: 2px; transition: width 0.5s; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.section-tag { font-size: 10px; color: var(--ice); background: rgba(91,184,245,0.1); padding: 2px 8px; border-radius: 10px; }
.achieve-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.achieve-card { background: rgba(91,184,245,0.05); border: 0.5px solid var(--card-border); border-radius: var(--radius-md); padding: 12px; text-align: center; }
.achieve-icon  { font-size: 22px; margin-bottom: 4px; }
.achieve-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.achieve-val   { font-size: 13px; font-weight: 500; color: var(--text-main); margin-top: 2px; }
.legend-dot { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(7,15,30,0.88); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:#0D2140; border:0.5px solid var(--card-border); border-radius:var(--radius-lg); padding:20px 22px; width:480px; max-width:95vw; box-shadow:0 8px 40px rgba(0,0,0,0.6); }
.modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal-title { font-size:14px; font-weight:500; color:var(--ice); }
.modal-close { background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; line-height:1; padding:0; }
.modal-close:hover { color:var(--text-main); }
.modal-footer { display:flex; gap:8px; margin-top:14px; justify-content:space-between; align-items:center; }
.btn-danger { background:rgba(220,53,69,0.12); border:0.5px solid rgba(220,53,69,0.45); color:#f87171; border-radius:var(--radius-md); padding:7px 14px; font-size:12px; cursor:pointer; font-family:inherit; }
.btn-danger:hover { background:rgba(220,53,69,0.25); }
.btn-secondary { background:rgba(91,184,245,0.06); border:0.5px solid var(--card-border); color:var(--text-muted); border-radius:var(--radius-md); padding:7px 14px; font-size:12px; cursor:pointer; font-family:inherit; }
.btn-secondary:hover { color:var(--text-main); }
.action-btn { background:none; border:none; cursor:pointer; padding:3px 7px; border-radius:4px; font-size:11px; font-family:inherit; transition:background 0.15s; }
.action-btn.edit { color:#5BB8F5; border:0.5px solid rgba(91,184,245,0.3); }
.action-btn.edit:hover { background:rgba(91,184,245,0.15); }
.action-btn.del  { color:#f87171; border:0.5px solid rgba(220,53,69,0.3); margin-left:4px; }
.action-btn.del:hover  { background:rgba(220,53,69,0.15); }

/* Notes */
.note-card { background:rgba(91,184,245,0.04); border:0.5px solid var(--card-border); border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:border-color 0.15s; }
.note-card:hover { border-color:rgba(91,184,245,0.4); }
.note-card-title { font-size:13px; font-weight:500; color:var(--text-main); margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
.note-card-preview { font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:85%; }
.note-card-date { font-size:10px; color:var(--text-muted); margin-top:4px; }
.note-tag { display:inline-block; padding:1px 8px; border-radius:10px; font-size:10px; font-weight:500; margin-right:4px; }
.note-tag-race     { background:rgba(240,180,41,0.15); color:var(--gold); }
.note-tag-training { background:rgba(91,184,245,0.15); color:var(--ice); }
.note-tag-general  { background:rgba(34,212,110,0.12); color:var(--green); }
.note-editor { width:100%; background:rgba(91,184,245,0.05); border:0.5px solid var(--card-border); border-radius:var(--radius-md); color:var(--text-main); font-family:inherit; font-size:13px; padding:10px 12px; resize:vertical; min-height:160px; line-height:1.6; }
.note-editor:focus { outline:none; border-color:var(--ice); }
.note-title-input { width:100%; background:rgba(91,184,245,0.05); border:0.5px solid var(--card-border); border-radius:var(--radius-md); color:var(--text-main); font-family:inherit; font-size:15px; font-weight:500; padding:8px 12px; margin-bottom:10px; }
.note-title-input:focus { outline:none; border-color:var(--ice); }
.note-tag-btn { background:rgba(91,184,245,0.05); border:0.5px solid var(--card-border); color:var(--text-muted); border-radius:20px; padding:3px 10px; font-size:11px; cursor:pointer; font-family:inherit; margin-right:5px; transition:all 0.15s; }
.note-tag-btn.active { background:rgba(91,184,245,0.18); border-color:var(--ice); color:var(--ice); }

/* Calendar */
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:16px; }
.cal-day-name { text-align:center; font-size:10px; color:var(--text-muted); padding:4px 0; text-transform:uppercase; letter-spacing:0.4px; }
.cal-day { min-height:64px; background:rgba(91,184,245,0.03); border:0.5px solid var(--card-border); border-radius:var(--radius-md); padding:5px; cursor:pointer; transition:border-color 0.15s; position:relative; }
.cal-day:hover { border-color:rgba(91,184,245,0.4); }
.cal-day.today { border-color:var(--ice); background:rgba(91,184,245,0.07); }
.cal-day.other-month { opacity:0.35; }
.cal-day-num { font-size:11px; color:var(--text-muted); margin-bottom:3px; }
.cal-day.today .cal-day-num { color:var(--ice); font-weight:600; }
.cal-event { font-size:9px; padding:1px 5px; border-radius:3px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
.cal-event-race     { background:rgba(240,180,41,0.25); color:#F0B429; }
.cal-event-training { background:rgba(91,184,245,0.2);  color:#5BB8F5; }
.cal-event-travel   { background:rgba(34,212,110,0.18); color:#22D46E; }
.cal-event-other    { background:rgba(155,163,175,0.2); color:#9BA3AF; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cal-nav-btn { background:rgba(91,184,245,0.07); border:0.5px solid var(--card-border); color:var(--ice); border-radius:var(--radius-md); padding:5px 12px; font-size:12px; cursor:pointer; font-family:inherit; }
.cal-nav-btn:hover { background:rgba(91,184,245,0.15); }
.cal-month-label { font-size:15px; font-weight:500; color:var(--text-main); }
.event-type-btn { border:0.5px solid var(--card-border); border-radius:20px; padding:3px 11px; font-size:11px; cursor:pointer; font-family:inherit; margin-right:5px; transition:all 0.15s; background:rgba(91,184,245,0.05); color:var(--text-muted); }
.event-type-btn.sel-race     { background:rgba(240,180,41,0.2); border-color:#F0B429; color:#F0B429; }
.event-type-btn.sel-training { background:rgba(91,184,245,0.2); border-color:#5BB8F5; color:#5BB8F5; }
.event-type-btn.sel-travel   { background:rgba(34,212,110,0.15); border-color:#22D46E; color:#22D46E; }
.event-type-btn.sel-other    { background:rgba(155,163,175,0.15); border-color:#9BA3AF; color:#9BA3AF; }
.upcoming-event { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:var(--radius-md); margin-bottom:5px; background:rgba(91,184,245,0.04); border:0.5px solid var(--card-border); }
.upcoming-date { font-size:11px; color:var(--text-muted); min-width:70px; }
.upcoming-title { font-size:13px; flex:1; }
.upcoming-type { font-size:10px; padding:1px 7px; border-radius:8px; font-weight:500; }
</head>
<body>
<div id="app">

<div class="header">
  <div class="header-left">
    <div>
      <div class="h-name">🇺🇸 Ellie Kleinheinz</div>
      <div class="h-sub">Junior Women's Singles · Santa Clara, CA · Team USA Junior National Team</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="font-size:11px;color:var(--text-muted);text-align:right;line-height:1.5;">4× National Champion<br>2024 Youth Olympian</div>
    <div style="width:1px;height:32px;background:var(--card-border);"></div>
    <div style="font-size:11px;color:var(--text-muted);text-align:right;line-height:1.5;">2026–27 Season<br><span style="color:var(--ice)">Junior World Cup</span></div>
    <div style="display:flex;align-items:center;gap:5px;margin-left:10px;" title="Firebase sync status">
      <div id="syncDot" style="width:8px;height:8px;border-radius:50%;background:#F0B429;transition:background 0.4s;flex-shrink:0;"></div>
      <span id="syncLabel" style="font-size:10px;color:var(--text-muted);">connecting…</span>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showView('overview',this)"><i class="ti ti-layout-dashboard"></i> Overview</button>
  <button class="nav-btn" onclick="showView('runs',this)"><i class="ti ti-list"></i> Run Log</button>
  <button class="nav-btn" onclick="showView('standings',this)"><i class="ti ti-trophy"></i> WC Standings</button>
  <button class="nav-btn" onclick="showView('map',this)"><i class="ti ti-map-pin"></i> Tracks</button>
  <button class="nav-btn" onclick="showView('photos',this)"><i class="ti ti-camera"></i> Photos</button>
  <button class="nav-btn" onclick="showView('notes',this)"><i class="ti ti-notebook"></i> Notes</button>
  <button class="nav-btn" onclick="showView('calendar',this)"><i class="ti ti-calendar"></i> Calendar</button>
  <button class="nav-btn" onclick="showView('log',this)"><i class="ti ti-circle-plus"></i> Add Run</button>
  <button class="nav-btn" onclick="showView('import',this)"><i class="ti ti-file-upload"></i> Import PDF</button>
</div>

<!-- OVERVIEW -->
<div id="view-overview" class="view active">
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Season PB</div><div class="stat-value" id="statPB" style="color:var(--text-muted)">—</div></div>
    <div class="stat-card"><div class="stat-label">JWC overall rank</div><div class="stat-value" id="statRank" style="color:var(--text-muted)">—</div></div>
    <div class="stat-card"><div class="stat-label">Runs this season</div><div class="stat-value ice" id="statRuns">0</div></div>
    <div class="stat-card"><div class="stat-label">National titles</div><div class="stat-value" style="color:#F0B429">4 🥇</div></div>
  </div>
  <div class="achieve-grid" style="margin-bottom:14px;">
    <div class="achieve-card"><div class="achieve-icon">🏆</div><div class="achieve-label">2025 Junior Nationals</div><div class="achieve-val">Champion</div></div>
    <div class="achieve-card"><div class="achieve-icon">🛷</div><div class="achieve-label">2024 Youth Olympics</div><div class="achieve-val">Gangwon, KOR</div></div>
    <div class="achieve-card"><div class="achieve-icon">⚡</div><div class="achieve-label">Junior WC debut</div><div class="achieve-val">Winterberg '24</div></div>
  </div>
  <div class="card">
    <div class="section-header">
      <div class="card-title">Season time trend — all tracks</div>
      <div class="section-tag">2026–27 JWC</div>
    </div>
    <div id="trendWrap" style="position:relative;height:185px;"><canvas id="trendChart"></canvas></div>
  </div>
  <div class="split-grid">
    <div class="card"><div class="card-title">Best times by track</div><div id="trackBars"></div></div>
    <div class="card"><div class="card-title">Sector comparison — latest vs PB</div><div id="splitWrap" style="position:relative;height:160px;"><canvas id="splitChart"></canvas></div></div>
  </div>
</div>

<!-- RUN LOG -->
<div id="view-runs" class="view">
  <div class="filter-row" id="runFilter">
    <button class="filter-chip active" onclick="filterRuns(this,'all')">All</button>
    <button class="filter-chip" onclick="filterRuns(this,'Lillehammer')">Lillehammer</button>
    <button class="filter-chip" onclick="filterRuns(this,'Sigulda')">Sigulda</button>
    <button class="filter-chip" onclick="filterRuns(this,'Oberhof')">Oberhof</button>
    <button class="filter-chip" onclick="filterRuns(this,'Winterberg')">Winterberg</button>
    <button class="filter-chip" onclick="filterRuns(this,'Lake Placid')">Lake Placid</button>
    <button class="filter-chip" onclick="filterRuns(this,'Park City')">Park City</button>
    <button class="filter-chip" onclick="filterRuns(this,'Bludenz')">Bludenz</button>
    <button class="filter-chip" onclick="filterRuns(this,'Königssee')">Königssee</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <table class="run-table">
      <thead><tr><th>Date</th><th>Track</th><th>Run</th><th>Time</th><th>S1 | S2 | S3</th><th>Rank</th><th>Notes</th><th>Actions</th></tr></thead>
      <tbody id="runTableBody"></tbody>
    </table>
  </div>
</div>

<!-- WC STANDINGS -->
<div id="view-standings" class="view">
  <div class="filter-row" id="standFilter">
    <button class="filter-chip active" onclick="filterStandings(this,'overall')">Overall JWC</button>
    <button class="filter-chip" onclick="filterStandings(this,'Bludenz')">Bludenz</button>
    <button class="filter-chip" onclick="filterStandings(this,'Winterberg')">Winterberg</button>
    <button class="filter-chip" onclick="filterStandings(this,'Lillehammer')">Lillehammer</button>
    <button class="filter-chip" onclick="filterStandings(this,'Sigulda')">Sigulda</button>
    <button class="filter-chip" onclick="filterStandings(this,'Lake Placid')">Lake Placid</button>
    <button class="filter-chip" onclick="filterStandings(this,'Park City')">Park City</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;">
    <div class="card" style="padding:12px;">
      <div class="card-title"><i class="ti ti-world" style="font-size:13px;"></i> International standings</div>
      <div id="leaderboard"></div>
    </div>
    <div class="card" style="padding:12px;border-color:rgba(178,34,52,0.35);">
      <div class="card-title">🇺🇸 USA standings</div>
      <div id="usa-leaderboard"></div>
    </div>
  </div>

let ovDone = false;
let trendChartInst = null, splitChartInst = null;

function initOverview() {
  if (ovDone) return; ovDone = true;
  const sorted = [...runData].sort((a,b) => a.date.localeCompare(b.date));

  if (sorted.length === 0) {
    document.getElementById('trendWrap').innerHTML = '<p style="color:var(--text-muted);font-size:13px;padding:40px 0;text-align:center;">No runs logged yet — add your first run to see the trend.</p>';
    document.getElementById('splitWrap').innerHTML = '<p style="color:var(--text-muted);font-size:13px;padding:30px 0;text-align:center;">No data yet.</p>';
    document.getElementById('trackBars').innerHTML = '<p style="color:var(--text-muted);font-size:12px;">No runs logged yet.</p>';
    return;
  }

  const labels = sorted.map(r => r.date.slice(5)+' '+r.track.slice(0,3));
  const times  = sorted.map(r => r.time);
  const minT = Math.min(...times), maxT = Math.max(...times);

  // Re-create canvas if replaced
  if (!document.getElementById('trendChart')) {
    document.getElementById('trendWrap').innerHTML = '<canvas id="trendChart"></canvas>';
  }
  if (trendChartInst) { trendChartInst.destroy(); trendChartInst = null; }
  trendChartInst = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels, datasets: [{ data:times, borderColor:'#5BB8F5', backgroundColor:'rgba(91,184,245,0.07)', pointBackgroundColor:'#5BB8F5', pointRadius:4, tension:0.35, borderWidth:2 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
      scales: { y:{ min:Math.floor(minT)-0.5, max:Math.ceil(maxT)+0.5, ticks:{color:'#7BA7CC',font:{size:10}}, grid:{color:'rgba(91,184,245,0.07)'} },
                x:{ ticks:{color:'#7BA7CC',font:{size:9},maxRotation:40,autoSkip:true}, grid:{display:false} } } }
  });

  const pbByTrack = {};
  runData.forEach(r => { if (!pbByTrack[r.track] || r.time < pbByTrack[r.track]) pbByTrack[r.track] = r.time; });
  const td = TRACKS.filter(t => pbByTrack[t.name]);
  if (td.length) {
    const vals = td.map(t => pbByTrack[t.name]);
    const mn = Math.min(...vals), mx = Math.max(...vals);
    document.getElementById('trackBars').innerHTML = td.sort((a,b)=>pbByTrack[a.name]-pbByTrack[b.name]).map(t => {
      const pct = mx===mn?50:Math.round(((pbByTrack[t.name]-mn)/(mx-mn))*65+20);
      return `<div class="speed-bar-wrap"><div class="speed-bar-label"><span>${t.name}</span><span style="color:#5BB8F5">${pbByTrack[t.name].toFixed(3)}s</span></div><div class="speed-bar-track"><div class="speed-bar-fill" style="width:${pct}%"></div></div></div>`;
    }).join('');
  }

  const latest = sorted[sorted.length-1];
  const pb     = sorted.reduce((a,b) => a.time<b.time?a:b);
  if (!document.getElementById('splitChart')) {
    document.getElementById('splitWrap').innerHTML = '<canvas id="splitChart"></canvas>';
  }
  if (splitChartInst) { splitChartInst.destroy(); splitChartInst = null; }
  splitChartInst = new Chart(document.getElementById('splitChart'), {
    type: 'bar',
    data: { labels:['S1','S2','S3'], datasets:[
      { label:'Latest', data:[latest.s1,latest.s2,latest.s3], backgroundColor:'rgba(91,184,245,0.45)', borderColor:'#5BB8F5', borderWidth:1 },
      { label:'PB',     data:[pb.s1,pb.s2,pb.s3],             backgroundColor:'rgba(34,212,110,0.4)',  borderColor:'#22D46E', borderWidth:1 }
    ]},
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
      scales: { y:{ min:10, ticks:{color:'#7BA7CC',font:{size:10}}, grid:{color:'rgba(91,184,245,0.07)'} }, x:{ ticks:{color:'#7BA7CC',font:{size:11}}, grid:{display:false} } } }
  });
}

function renderRunTable(track) {
  const indexed = runData.map((r,i) => ({...r, _idx:i}));

  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

  runData.forEach(r => { if (!pbByTrack[r.track]||r.time<pbByTrack[r.track]) pbByTrack[r.track]=r.time; });
  document.getElementById('runTableBody').innerHTML = sorted.length===0
    ? `<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:24px;">No runs logged yet.</td></tr>`
    : sorted.map(r => {
        const isPB = r.time===pbByTrack[r.track];
        const bc = r.rank<=3?['badge-gold','badge-silver','badge-bronze'][r.rank-1]:'badge-blue';
        return `<tr>
          <td>${r.date}</td><td>${r.track}</td><td>Run ${r.run}</td>
          <td style="font-variant-numeric:tabular-nums;color:${isPB?'#22D46E':'inherit'}">${r.time.toFixed(3)}s${isPB?' <span class="pb-tag">PB</span>':''}</td>

          <td><span class="badge ${bc}">#${r.rank}</span></td>
          <td style="font-size:11px;color:#7BA7CC">${r.notes||''}</td>

          </td></tr>`;
      }).join('');
}

const NAT_TO_ISO = { USA:'us',GER:'de',AUT:'at',ITA:'it',LAT:'lv',ROU:'ro',THA:'th',UKR:'ua',POL:'pl',CAN:'ca',SVK:'sk',GBR:'gb' };

function flagImg(nat) {
  const iso = NAT_TO_ISO[nat];
  return iso ? `<img src="https://flagcdn.com/20x15/${iso}.png" width="20" height="15" alt="${nat}" style="vertical-align:middle;margin-left:7px;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,0.12);">` : '';
}

function natBadge(nat, me) {
  const colors = { USA:'#B22234',GER:'#000',AUT:'#ED2939',ITA:'#009246',LAT:'#9E3039',ROU:'#002B7F',THA:'#A51931',UKR:'#005BBB',POL:'#DC143C',CAN:'#FF0000',SVK:'#0B4EA2',GBR:'#012169' };
  const bg = me?'rgba(91,184,245,0.2)':`${colors[nat]||'#444'}22`;
  const border = me?'#5BB8F5':(colors[nat]||'#666');
  const color  = me?'#5BB8F5':'#E8F4FD';
  return `<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.5px;background:${bg};border:1px solid ${border};color:${color};margin-right:6px;">${nat}</span>`;
}

function buildLbRows(rows) {
  return rows.map(r => {
    const pc = r.pos===1?'p1':r.pos===2?'p2':r.pos===3?'p3':'';
    const medal = r.pos===1?'🥇':r.pos===2?'🥈':r.pos===3?'🥉':r.pos;
    return `<div class="lb-row ${r.me?'me':''}">
      <div class="lb-pos ${pc}">${medal}</div>
      <div class="lb-name">${natBadge(r.nat,r.me)}${r.name}${flagImg(r.nat)}${r.me?' <span style="font-size:10px;color:#5BB8F5;margin-left:6px;">(Ellie)</span>':''}</div>
      <div class="lb-pts">${r.pts} pts<span class="lb-diff">${r.diff||''}</span></div>
    </div>`;
  }).join('');
}

let mapDone=false, mapZoomBehavior, mapSvgSel, mapGMain;

function initMap() {
  if (mapDone) return; mapDone=true;
  const W=900, H=460;
  const popup = document.getElementById('trackPopup');
  mapSvgSel = d3.select('#worldSvg').attr('viewBox',`0 0 ${W} ${H}`);
  mapGMain  = mapSvgSel.append('g').attr('class','map-root');
  const proj = d3.geoNaturalEarth1().scale(155).translate([W/2,H/2]);
  const path = d3.geoPath(proj);
  mapZoomBehavior = d3.zoom().scaleExtent([1,12]).translateExtent([[0,0],[W,H]])
    .on('zoom', event => {
      mapGMain.attr('transform', event.transform);
      const k = event.transform.k;
      mapGMain.selectAll('.pin-outer').attr('r', 9/Math.sqrt(k));
      mapGMain.selectAll('.pin-inner').attr('r', 3.5/Math.sqrt(k));
      mapGMain.selectAll('.pin-label').attr('font-size', Math.max(7, 9/Math.sqrt(k)));
      mapGMain.selectAll('path').attr('stroke-width', 0.5/k);
    });
  mapSvgSel.call(mapZoomBehavior).on('dblclick.zoom', null);

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
    mapGMain.selectAll('path').data(topojson.feature(world,world.objects.countries).features)
      .join('path').attr('d',path).attr('fill','#0D2140').attr('stroke','rgba(91,184,245,0.2)').attr('stroke-width',0.5);
    TRACKS.forEach(t => {
      const xy = proj([t.lon,t.lat]);
      if (!xy||!xy[0]) return;
      const [x,y]=xy;
      const g = mapGMain.append('g').style('cursor','pointer');
      g.append('circle').attr('class','pin-outer').attr('cx',x).attr('cy',y).attr('r',9).attr('fill','rgba(91,184,245,0.12)').attr('stroke','#5BB8F5').attr('stroke-width',1.5);
      g.append('circle').attr('class','pin-inner').attr('cx',x).attr('cy',y).attr('r',3.5).attr('fill','#5BB8F5');
      g.append('text').attr('class','pin-label').attr('x',x+11).attr('y',y+4).attr('fill','#7BA7CC').attr('font-size','9').text(t.name);
      g.on('mouseover', () => {
        const svgRect = document.getElementById('worldSvg').getBoundingClientRect();
        const tr = d3.zoomTransform(mapSvgSel.node());
        const px = tr.applyX(x)*(svgRect.width/W);
        const py = tr.applyY(y)*(svgRect.height/H);
        popup.style.display='block';
        popup.style.left=Math.min(px+10,svgRect.width-170)+'px';
        popup.style.top=Math.max(py-15,5)+'px';
        popup.innerHTML=`<strong>${t.name}, ${t.country}</strong>
          <div style="color:#E8F4FD;margin-top:3px">Best: <b style="color:#22D46E">${t.myBest}</b></div>
          <div style="color:#7BA7CC">JWC rank: <span style="color:#F0B429">${t.rank==='—'?'—':'#'+t.rank}</span></div>
          <div style="color:#7BA7CC">${t.races} race(s) logged</div>`;
      }).on('mouseout', () => popup.style.display='none')
        .on('click', () => {
          popup.style.display='none';
          const tr = runData.filter(r=>r.track===t.name);
          const pb2={};
          runData.forEach(r=>{if(!pb2[r.track]||r.time<pb2[r.track])pb2[r.track]=r.time;});
          if (!tr.length) { document.getElementById('trackDetail').innerHTML=`<div class="card"><p style="color:var(--text-muted);font-size:12px">No runs logged at ${t.name} yet.</p></div>`; return; }
          const rws = tr.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
            const isPB=r.time===pb2[r.track];
            const bc=r.rank<=3?['badge-gold','badge-silver','badge-bronze'][r.rank-1]:'badge-blue';
            return `<tr><td>${r.date}</td><td>Run ${r.run}</td><td style="color:${isPB?'#22D46E':'#E8F4FD'}">${r.time.toFixed(3)}s${isPB?' <span class="pb-tag">PB</span>':''}</td><td><span class="badge ${bc}">#${r.rank}</span></td><td style="font-size:11px;color:#7BA7CC">${r.notes||''}</td></tr>`;
          }).join('');
          document.getElementById('trackDetail').innerHTML=`<div class="card"><div class="card-title">${t.name} · ${t.country} | PB: ${t.myBest} | Best rank: ${t.rank==='—'?'—':'#'+t.rank}</div><table class="run-table"><thead><tr><th>Date</th><th>Run</th><th>Time</th><th>Rank</th><th>Notes</th></tr></thead><tbody>${rws}</tbody></table></div>`;
        });
    });
  });
}

async function handlePhotoUpload(input) {
  for (const file of Array.from(input.files)) {
    try {
      setSyncStatus('syncing');
      const path = `photos/${Date.now()}_${file.name}`;
      const sRef = storage.ref(path);
      await sRef.put(file);
      const url = await sRef.getDownloadURL();
      await db.collection('photos').add({ url, caption:file.name.slice(0,30), storagePath:path, uploadedAt:Date.now() });
      setSyncStatus('ok');
    } catch(e) {
      console.error('Photo upload error:', e);
      setSyncStatus('error');
    }
  }
  input.value='';
}

function deletePhoto(firestoreId, storagePath) {
  if (!confirm('Remove this photo?')) return;
  db.collection('photos').doc(firestoreId).delete().catch(console.error);
  if (storagePath) storage.ref(storagePath).delete().catch(console.error);
}

async function addRun() {
  const track = document.getElementById('logTrack').value;
  const date  = document.getElementById('logDate').value;
  const run   = parseInt(document.getElementById('logRun').value)||1;
  const time  = parseFloat(document.getElementById('logTime').value);
  const s1    = parseFloat(document.getElementById('logS1').value)||0;
  const s2    = parseFloat(document.getElementById('logS2').value)||0;
  const s3    = parseFloat(document.getElementById('logS3').value)||0;
  const rank  = parseInt(document.getElementById('logRank').value)||99;
  const notes = document.getElementById('logNotes').value;
  if (!date||!time) { document.getElementById('logMsg').textContent='Please fill in date and time.'; return; }
  const runObj = { date,track,run,time,s1,s2,s3,rank,notes };
  const id = `${date}_${track.replace(/\s/g,'_')}_run${run}_${Date.now()}`;
  try {
    setSyncStatus('syncing');
    document.getElementById('logMsg').textContent='Saving…';
    await db.collection('runs').doc(id).set(runObj);
    document.getElementById('logMsg').textContent='Run saved & synced! ✓';
    setSyncStatus('ok');
  } catch(e) {
    runData.push({...runObj,_id:id});
    ovDone=false; refreshStatCards();
    document.getElementById('logMsg').textContent='Saved locally (offline).';
    setSyncStatus('error');
  }
  setTimeout(()=>{ document.getElementById('logMsg').textContent=''; },3000);
}

  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editingIdx = null;
}

async function saveEdit() {
  if (editingIdx===null) return;
  const time = parseFloat(document.getElementById('editTime').value);
  const date = document.getElementById('editDate').value;
  if (!date||!time) { alert('Please fill in date and time.'); return; }
  const updated = {
    track: document.getElementById('editTrack').value, date,
    run:   parseInt(document.getElementById('editRun').value)||1, time,
    s1:    parseFloat(document.getElementById('editS1').value)||0,
    s2:    parseFloat(document.getElementById('editS2').value)||0,
    s3:    parseFloat(document.getElementById('editS3').value)||0,
    rank:  parseInt(document.getElementById('editRank').value)||99,
    notes: document.getElementById('editNotes').value,
  };
  const fid = runData[editingIdx]._id;
  closeModal();
  try {
    setSyncStatus('syncing');
    await db.collection('runs').doc(fid).set(updated);
    setSyncStatus('ok');
  } catch(e) {
    runData[editingIdx]={...updated,_id:fid};
    ovDone=false; renderRunTable(currentFilter); refreshStatCards();
    setSyncStatus('error');
  }
}

async function deleteRun(idx) {
  if (!confirm('Delete this run? This cannot be undone.')) return;
  const fid = runData[idx]._id;
  try {
    setSyncStatus('syncing');
    await db.collection('runs').doc(fid).delete();
    setSyncStatus('ok');
  } catch(e) {
    runData.splice(idx,1);
    ovDone=false; renderRunTable(currentFilter); refreshStatCards();
    setSyncStatus('error');
  }
}

function confirmDelete() {
  if (editingIdx===null) return;
  closeModal();
  deleteRun(editingIdx);
}

function refreshStatCards() {
  const pb   = document.getElementById('statPB');
  const runs = document.getElementById('statRuns');
  if (runData.length===0) {
    if(pb)   { pb.textContent='—';  pb.style.color='var(--text-muted)'; }
    if(runs)   runs.textContent='0';
  } else {
    const best = Math.min(...runData.map(r=>r.time));
    if(pb)   { pb.textContent=best.toFixed(3)+'s'; pb.style.color='#22D46E'; }
    if(runs)   runs.textContent=runData.length;
  }
}

  1:100,2:85,3:70,4:60,5:55,6:50,7:46,8:42,9:39,10:36,
  11:34,12:32,13:30,14:28,15:26,16:25,17:24,18:23,19:22,20:21,
  21:20,22:19,23:18,24:17,25:16,26:15,27:14,28:13,29:12,30:11,

let parsedResults=[], parsedVenue='', parsedRun='';

function handlePdfDrop(e) {
  e.preventDefault();
  document.getElementById('pdfDropZone').style.borderColor='';
  const file = e.dataTransfer.files[0];
  if (file&&file.type==='application/pdf') handlePdfFile(file);
}

async function handlePdfFile(file) {
  if (!file) return;
  showImportStatus('Reading PDF…');
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let text = '';
    for (let p=1;p<=pdf.numPages;p++) {
      const items = (await (await pdf.getPage(p)).getTextContent()).items;
      text += items.map(i=>i.str).join(' ')+'\n';
    }
    parseResults(text);
  } catch(e) { showImportStatus('❌ Could not read PDF: '+e.message, true); }
}

function parseResults(text) {
  const knownTracks = ['Winterberg','Lillehammer','Sigulda','Oberhof','Lake Placid','Park City','Bludenz','Königssee'];
  parsedVenue = knownTracks.find(t=>text.includes(t))||'Unknown';
  const rm = text.match(/Lauf\s*(\d+)/i)||text.match(/Run\s*(\d+)/i);
  parsedRun  = rm?rm[1]:'?';
  const rt   = text.replace(/\s+/g,' ');
  const results = [];
  const re = /\b(\d{1,2})\s+(\d{1,3})\s+([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\s]{2,35?})\s+(AUT|GER|ITA|LAT|ROU|THA|UKR|POL|USA|CAN|SVK|GBR|NOR|SUI|FRA|ESP|NED|SWE|FIN|CZE|HUN)\b.{10,300}?(\d{1}:\d{2}\.\d{3})/g;
  let m;
  while((m=re.exec(rt))!==null){
    const rank=parseInt(m[1]), name=m[3].trim().replace(/\s+/g,' '), nation=m[4], total=m[5];
    const tp=total.split(':');
    const secs=tp.length===2?parseInt(tp[0])*60+parseFloat(tp[1]):parseFloat(total);
    const blk=rt.slice(Math.max(0,m.index),m.index+m[0].length+20);
    const tr2=/\b4\d\.\d{3}\b/g; const rts=[];
    let tm; while((tm=tr2.exec(blk))!==null) rts.push(parseFloat(tm[0]));
    results.push({rank,name,nation,run1:rts[0]||null,run2:rts[1]||null,total:secs,totalStr:total,pts:FIL_POINTS[rank]||0});
  }
  const dnfRe=/\b(\d{1,2})\s+([A-ZÄÖÜ][A-Za-zÄÖÜäöüß\s]{2,35?})\s+(AUT|GER|ITA|LAT|ROU|THA|UKR|POL|USA|CAN|SVK|GBR|NOR|SUI)\b.+?DNF/g;
  while((m=dnfRe.exec(rt))!==null){
    const name=m[2].trim().replace(/\s+/g,' ');
    if (!results.find(r=>r.name.toLowerCase().includes(name.split(' ')[0].toLowerCase())))
      results.push({rank:999,name,nation:m[3],run1:null,run2:null,total:null,totalStr:'DNF',pts:0});
  }
  if (!results.length) { showImportStatus('⚠️ Could not parse results. Check this is a FIL Junior Women PDF.', true); return; }
  parsedResults=results;
  showImportStatus('');
  renderImportPreview();
}

function renderImportPreview() {
  document.getElementById('importStatus').style.display='none';
  document.getElementById('importPreview').style.display='block';
  document.getElementById('importMeta').textContent=`${parsedVenue} · Lauf ${parsedRun} · ${parsedResults.length} athletes`;
  if (!document.getElementById('importDate').value)
    document.getElementById('importDate').value=new Date().toISOString().slice(0,10);
  const ell=['kleinheinz','elizabeth','ellie'];
  document.getElementById('importTableBody').innerHTML=parsedResults.map(r=>{
    const isE=ell.some(n=>r.name.toLowerCase().includes(n));
    const pc=r.pts>0?'color:#22D46E;font-weight:500;':'color:var(--text-muted);';
    const rb=r.rank<=3?['badge-gold','badge-silver','badge-bronze'][r.rank-1]:r.rank<900?'badge-blue':'';
    return `<tr style="${isE?'background:rgba(91,184,245,0.08);':''}">
      <td>${r.rank<900?`<span class="badge ${rb}">#${r.rank}</span>`:'—'}</td>
      <td style="${isE?'color:#5BB8F5;font-weight:500;':''}">${r.name}${isE?' ⭐':''}</td>
      <td>${natBadge(r.nation,false)}</td>
      <td style="font-size:11px;color:var(--text-muted)">${r.run1?r.run1.toFixed(3)+'s':'—'}</td>
      <td style="font-size:11px;color:var(--text-muted)">${r.run2?r.run2.toFixed(3)+'s':r.totalStr==='DNF'?'<span style="color:#f87171">DNF</span>':'—'}</td>
      <td style="font-weight:500">${r.totalStr!=='DNF'?r.totalStr:'<span style="color:#f87171">DNF</span>'}</td>
      <td style="${pc}">${r.pts||(r.totalStr==='DNF'?'0':'—')}</td>
      <td style="font-size:10px;color:var(--text-muted)">${isE?'✅ Will update':''}</td>
    </tr>`;
  }).join('');
}

async function applyImport() {
  const date   = document.getElementById('importDate').value||new Date().toISOString().slice(0,10);
  const addRun = document.getElementById('addEllieRun').checked;
  const ell    = ['kleinheinz','elizabeth','ellie'];

  parsedResults.forEach(res => {
    if (res.pts<=0) return;
    const nl = res.name.toLowerCase();
    const match = ALL_ATHLETES.find(a => a.name.toLowerCase().split(' ').some(p=>p.length>3&&nl.includes(p)));
    if (match) {
      Object.keys(STANDINGS).forEach(k=>{ const row=STANDINGS[k].find(r=>r.name===match.name); if(row) row.pts+=res.pts; });
      Object.keys(USA_STANDINGS).forEach(k=>{ const row=USA_STANDINGS[k].find(r=>r.name===match.name); if(row) row.pts+=res.pts; });
    }
  });
  Object.keys(STANDINGS).forEach(k=>{ STANDINGS[k].sort((a,b)=>b.pts-a.pts); STANDINGS[k].forEach((r,i)=>{r.pos=i+1;r.diff=i===0?'':(r.pts-STANDINGS[k][0].pts).toString();}); });
  Object.keys(USA_STANDINGS).forEach(k=>{ USA_STANDINGS[k].sort((a,b)=>b.pts-a.pts); USA_STANDINGS[k].forEach((r,i)=>{r.pos=i+1;r.diff=i===0?'':(r.pts-USA_STANDINGS[k][0].pts).toString();}); });

  if (addRun) {
    const er = parsedResults.find(r=>ell.some(n=>r.name.toLowerCase().includes(n)));
    if (er&&er.total) {
      const base={track:parsedVenue,rank:er.rank,s1:0,s2:0,s3:0,notes:`Imported · Lauf ${parsedRun}`,date};
      if (er.run1) { const id=`${date}_${parsedVenue.replace(/\s/g,'_')}_run1_${Date.now()}`; await db.collection('runs').doc(id).set({...base,run:1,time:er.run1}).catch(console.error); }
      if (er.run2&&er.run2!==er.run1) { const id=`${date}_${parsedVenue.replace(/\s/g,'_')}_run2_${Date.now()+1}`; await db.collection('runs').doc(id).set({...base,run:2,time:er.run2}).catch(console.error); }
    }
  }

  try {
    setSyncStatus('syncing');
    await db.collection('meta').doc('standings').set({STANDINGS,USA_STANDINGS});
    setSyncStatus('ok');
  } catch(e) { console.error(e); setSyncStatus('error'); }

  ptsDone=false; renderLeaderboard('overall'); renderUSALeaderboard('overall');
  document.getElementById('importMsg').textContent=`✅ Applied & synced! ${addRun?"Ellie's runs added.":""}`;
  setTimeout(()=>{ document.getElementById('pdfFileInput').value=''; parsedResults=[]; },3000);
}

function cancelImport() {
  document.getElementById('importPreview').style.display='none';
  document.getElementById('importStatus').style.display='none';
  document.getElementById('pdfFileInput').value='';
  parsedResults=[];
}

function showImportStatus(msg, isError) {
  const el=document.getElementById('importStatus');
  const tx=document.getElementById('importStatusText');
  if (!msg) { el.style.display='none'; return; }
  el.style.display='block';
  tx.style.color=isError?'#f87171':'var(--text-muted)';
  tx.textContent=msg;
}

// NOTES
// ─────────────────────────────────────────────
let notesData        = [];   // [{_id, title, body, tag, date, updatedAt}]
let currentNoteId    = null;
let currentNoteTag   = 'general';
let currentNoteFilter= 'all';

function filterNotes(el, tag) {
  document.querySelectorAll('#noteFilterRow .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentNoteFilter = tag;
  renderNotesList(tag);
}

function renderNotesList(filter) {
  const list = filter==='all' ? notesData : notesData.filter(n=>n.tag===filter);
  const sorted = [...list].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const el = document.getElementById('notesList');
  if (!sorted.length) {
    el.innerHTML='<p style="color:var(--text-muted);font-size:13px;padding:20px 0;">No notes yet.</p>';
    return;
  }
  const tagClass = { race:'note-tag-race', training:'note-tag-training', general:'note-tag-general' };
  el.innerHTML = sorted.map(n => `
    <div class="note-card" onclick="openEditNote('${n._id}')">
      <div class="note-card-title">
        <span>${n.title||'Untitled'}</span>
        <span class="note-tag ${tagClass[n.tag]||'note-tag-general'}">${n.tag||'general'}</span>
      </div>
      <div class="note-card-preview">${(n.body||'').replace(/\n/g,' ')}</div>
      <div class="note-card-date">${n.date||''} · ${n.updatedAt ? new Date(n.updatedAt).toLocaleDateString() : ''}</div>
    </div>`).join('');
}

function openNewNote() {
  currentNoteId = null;
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteBody').value  = '';
  document.getElementById('noteDate').value  = new Date().toISOString().slice(0,10);
  document.getElementById('noteEditorMeta').textContent = 'New note';
  document.getElementById('noteDeleteBtn').style.display = 'none';
  document.getElementById('noteSaveMsg').textContent = '';
  selectNoteTag('general');
  document.getElementById('notes-list-panel').style.display   = 'none';
  document.getElementById('notes-editor-panel').style.display = 'block';
}

function openEditNote(id) {
  const note = notesData.find(n=>n._id===id);
  if (!note) return;
  currentNoteId = id;
  document.getElementById('noteTitle').value = note.title||'';
  document.getElementById('noteBody').value  = note.body||'';
  document.getElementById('noteDate').value  = note.date||'';
  document.getElementById('noteEditorMeta').textContent = 'Editing note';
  document.getElementById('noteDeleteBtn').style.display = 'inline-flex';
  document.getElementById('noteSaveMsg').textContent = '';
  selectNoteTag(note.tag||'general');
  document.getElementById('notes-list-panel').style.display   = 'none';
  document.getElementById('notes-editor-panel').style.display = 'block';
}

function closeNoteEditor() {
  document.getElementById('notes-editor-panel').style.display = 'none';
  document.getElementById('notes-list-panel').style.display   = 'block';
  renderNotesList(currentNoteFilter);
}

function selectNoteTag(tag) {
  currentNoteTag = tag;
  ['general','race','training'].forEach(t => {
    const btn = document.getElementById('tagBtn'+t.charAt(0).toUpperCase()+t.slice(1));
    if (btn) btn.classList.toggle('active', t===tag);
  });
}

async function saveNote() {
  const title = document.getElementById('noteTitle').value.trim()||'Untitled';
  const body  = document.getElementById('noteBody').value;
  const date  = document.getElementById('noteDate').value;
  const noteObj = { title, body, tag:currentNoteTag, date, updatedAt:Date.now() };
  try {
    setSyncStatus('syncing');
    if (currentNoteId) {
      await db.collection('notes').doc(currentNoteId).set(noteObj);
    } else {
      const ref = await db.collection('notes').add(noteObj);
      currentNoteId = ref.id;
      document.getElementById('noteDeleteBtn').style.display = 'inline-flex';
    }
    document.getElementById('noteSaveMsg').textContent = 'Saved ✓';
    document.getElementById('noteEditorMeta').textContent = 'Note saved';
    setSyncStatus('ok');
    setTimeout(()=>{ document.getElementById('noteSaveMsg').textContent=''; },2000);
  } catch(e) {
    console.error('Note save error:', e);
    document.getElementById('noteSaveMsg').textContent = 'Error saving. Check connection.';
    document.getElementById('noteSaveMsg').style.color = '#f87171';
    setSyncStatus('error');
  }
}

async function deleteNote() {
  if (!currentNoteId) return;
  if (!confirm('Delete this note?')) return;
  try {
    await db.collection('notes').doc(currentNoteId).delete();
    closeNoteEditor();
  } catch(e) { console.error('Note delete error:', e); }
}

// ─────────────────────────────────────────────
// CALENDAR
// ─────────────────────────────────────────────
let calEvents      = [];   // [{_id, title, date, endDate, type, notes}]
let calYear        = new Date().getFullYear();
let calMonth       = new Date().getMonth();  // 0-indexed
let selectedEvType = 'race';
let viewingEventId = null;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const EV_COLORS   = { race:'cal-event-race', training:'cal-event-training', travel:'cal-event-travel', other:'cal-event-other' };
const EV_LABELS   = { race:'🏆 Race', training:'🛷 Training', travel:'✈ Travel', other:'📌 Other' };
const EV_BADGE    = { race:'rgba(240,180,41,0.25)', training:'rgba(91,184,245,0.2)', travel:'rgba(34,212,110,0.18)', other:'rgba(155,163,175,0.2)' };
const EV_COLOR    = { race:'#F0B429', training:'#5BB8F5', travel:'#22D46E', other:'#9BA3AF' };

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth=0; calYear++; }
  if (calMonth < 0)  { calMonth=11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;

  // Day name headers
  const dn = document.getElementById('calDayNames');
  dn.innerHTML = DAY_NAMES.map(d=>`<div class="cal-day-name">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Cells before month start
  for (let i=0; i<firstDay; i++) {
    const day = daysInPrev - firstDay + 1 + i;
    const dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    grid.appendChild(makeDayCell(day, dateStr, true, false));
  }
  // This month's cells
  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    grid.appendChild(makeDayCell(d, dateStr, false, dateStr===todayStr));
  }
  // Fill remaining cells
  const totalCells = firstDay + daysInMonth;
  const remainder  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d=1; d<=remainder; d++) {
    const dateStr = `${calYear}-${String(calMonth+2).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    grid.appendChild(makeDayCell(d, dateStr, true, false));
  }

  renderUpcoming();
}

function makeDayCell(dayNum, dateStr, otherMonth, isToday) {
  const cell = document.createElement('div');
  cell.className = 'cal-day' + (otherMonth?' other-month':'') + (isToday?' today':'');
  cell.innerHTML = `<div class="cal-day-num">${dayNum}</div>`;

  // Find events on this date (including multi-day spans)
  const evs = calEvents.filter(e => {
    if (!e.date) return false;
    if (e.endDate && e.endDate > e.date) return dateStr >= e.date && dateStr <= e.endDate;
    return e.date === dateStr;
  });

  evs.slice(0,3).forEach(e => {
    const tag = document.createElement('div');
    tag.className = `cal-event ${EV_COLORS[e.type]||'cal-event-other'}`;
    tag.textContent = e.title;
    tag.onclick = (ev) => { ev.stopPropagation(); openEventModal(e._id); };
    cell.appendChild(tag);
  });
  if (evs.length > 3) {
    const more = document.createElement('div');
    more.style.cssText='font-size:9px;color:var(--text-muted);padding-left:3px;';
    more.textContent = `+${evs.length-3} more`;
    cell.appendChild(more);
  }

  cell.onclick = () => prefillEventDate(dateStr);
  return cell;
}

function prefillEventDate(dateStr) {
  document.getElementById('evDate').value = dateStr;
  document.getElementById('evTitle').focus();
}

function renderUpcoming() {
  const todayStr = new Date().toISOString().slice(0,10);
  const upcoming = calEvents
    .filter(e => e.date >= todayStr)
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0,8);
  const el = document.getElementById('upcomingList');
  if (!upcoming.length) { el.innerHTML='<p style="font-size:12px;color:var(--text-muted);">No upcoming events.</p>'; return; }
  el.innerHTML = upcoming.map(e => `
    <div class="upcoming-event" onclick="openEventModal('${e._id}')" style="cursor:pointer;">
      <div class="upcoming-date">${e.date}</div>
      <div class="upcoming-title">${e.title}</div>
      <div class="upcoming-type" style="background:${EV_BADGE[e.type]||EV_BADGE.other};color:${EV_COLOR[e.type]||EV_COLOR.other};">${EV_LABELS[e.type]||'Other'}</div>
    </div>`).join('');
}

function selectEvType(type) {
  selectedEvType = type;
  ['race','training','travel','other'].forEach(t => {
    const btn = document.getElementById('evType'+t.charAt(0).toUpperCase()+t.slice(1));
    if (!btn) return;
    btn.className = 'event-type-btn' + (t===type ? ` sel-${t}` : '');
  });
}

async function addCalEvent() {
  const title   = document.getElementById('evTitle').value.trim();
  const date    = document.getElementById('evDate').value;
  const endDate = document.getElementById('evEndDate').value;
  const notes   = document.getElementById('evNotes').value;
  if (!title||!date) { document.getElementById('evMsg').textContent='Please add a title and date.'; return; }
  const evObj = { title, date, endDate:endDate||'', type:selectedEvType, notes, createdAt:Date.now() };
  try {
    setSyncStatus('syncing');
    await db.collection('calEvents').add(evObj);
    document.getElementById('evTitle').value   = '';
    document.getElementById('evEndDate').value = '';
    document.getElementById('evNotes').value   = '';
    document.getElementById('evMsg').textContent = 'Event added ✓';
    setSyncStatus('ok');
    setTimeout(()=>{ document.getElementById('evMsg').textContent=''; },2000);
  } catch(e) {
    console.error('Event add error:', e);
    document.getElementById('evMsg').textContent = 'Error. Check connection.';
    document.getElementById('evMsg').style.color = '#f87171';
    setSyncStatus('error');
  }
}

function openEventModal(id) {
  const e = calEvents.find(ev=>ev._id===id);
  if (!e) return;
  viewingEventId = id;
  document.getElementById('eventModalTitle').textContent = e.title;
  document.getElementById('eventModalBody').innerHTML = `
    <div style="margin-bottom:6px;"><span style="padding:2px 9px;border-radius:8px;font-size:11px;font-weight:500;background:${EV_BADGE[e.type]||EV_BADGE.other};color:${EV_COLOR[e.type]||EV_COLOR.other};">${EV_LABELS[e.type]||'Other'}</span></div>
    <div><b style="color:var(--text-main)">Date:</b> ${e.date}${e.endDate?' → '+e.endDate:''}</div>
    ${e.notes?`<div style="margin-top:6px;"><b style="color:var(--text-main)">Notes:</b> ${e.notes}</div>`:''}`;
  document.getElementById('eventModal').classList.add('open');
}

function closeEventModal() {
  document.getElementById('eventModal').classList.remove('open');
  viewingEventId = null;
}

async function deleteCalEvent() {
  if (!viewingEventId) return;
  if (!confirm('Delete this event?')) return;
  try {
    await db.collection('calEvents').doc(viewingEventId).delete();
    closeEventModal();
  } catch(e) { console.error('Event delete error:', e); }
}

db.collection('meta').doc('standings').onSnapshot(snap => {
  if (snap.exists) {
    const data = snap.data();
    if (data.STANDINGS)     Object.assign(STANDINGS, data.STANDINGS);

    renderUSALeaderboard('overall');

});

db.collection('photos').onSnapshot(snap => {
  const grid = document.getElementById('photoGrid');
  grid.querySelectorAll('.photo-slot:not(.add-new)').forEach(el=>el.remove());
  snap.docs.forEach(d => {
    const {url, caption, storagePath} = d.data();

    slot.className='photo-slot';
    slot.innerHTML=`<img src="${url}" alt="${caption||''}">
      <div class="photo-caption">${caption||''}</div>
      <button onclick="deletePhoto('${d.id}','${storagePath||''}')" style="position:absolute;top:4px;right:4px;background:rgba(220,53,69,0.8);border:none;color:#fff;border-radius:4px;font-size:10px;padding:2px 5px;cursor:pointer;">✕</button>`;

    if (adds.length) grid.insertBefore(slot,adds[0]); else grid.appendChild(slot);
  });
